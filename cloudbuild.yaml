steps:
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build'
    args:
      - '--dockerfile=Dockerfile'
      - '--context=dir://.'
      - '--destination=australia-southeast1-docker.pkg.dev/$PROJECT_ID/homelab/homelab-mcp-server:$BUILD_ID'
      - '--destination=australia-southeast1-docker.pkg.dev/$PROJECT_ID/homelab/homelab-mcp-server:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--cache-repo=australia-southeast1-docker.pkg.dev/$PROJECT_ID/homelab/homelab-mcp-server-cache'
      - '--snapshot-mode=redo'
      - '--use-new-run'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'homelab-mcp-server'
      - '--image'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/homelab/homelab-mcp-server:$BUILD_ID'
      - '--region'
      - 'australia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=2'
    waitFor: ['build']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
